<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Student Result Calculator</h1>

        <input
            type="number"
            id="bangla"
            placeholder="Bangla Marks"
        >

        <input
            type="number"
            id="english"
            placeholder="English Marks"
        >

        <input
            type="number"
            id="math"
            placeholder="Math Marks"
        >

        <button id="calculateBtn">
            Calculate Result
        </button>

        <div class="result">
            <p id="total">Total: 0</p>
            <p id="average">Average: 0</p>
            <p id="grade">Grade: -</p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
